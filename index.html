
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAREFAS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
</head>

<body class="bg-gray-950 text-gray-100">
<div id="root"></div>

<script>
const { useState, useEffect } = React;

const ETAPAS = ["A Fazer", "Em Progresso", "Concluído"];

const corPorColuna = {
  "A Fazer": "border-l-red-500",
  "Em Progresso": "border-l-yellow-500",
  "Concluído": "border-l-green-500"
};

const corPrioridadeBadge = {
  Alta: "bg-red-600 text-white",
  Média: "bg-yellow-500 text-black",
  Baixa: "bg-green-600 text-white"
};

function progressoChecklist(lista = []) {
  return lista.length
    ? Math.round((lista.filter(i => i.done).length / lista.length) * 100)
    : 0;
}

function App() {
  const [board, setBoard] = useState(() => {
    const salvo = localStorage.getItem("tarefas");
    if (!salvo) return { "A Fazer": [], "Em Progresso": [], "Concluído": [] };
    try { return JSON.parse(salvo); }
    catch { return { "A Fazer": [], "Em Progresso": [], "Concluído": [] }; }
  });

  const [modal, setModal] = useState(false);
  const [editando, setEditando] = useState(null);

  const [titulo, setTitulo] = useState("");
  const [descricao, setDescricao] = useState("");
  const [prazo, setPrazo] = useState("");
  const [prioridade, setPrioridade] = useState("Média");
  const [checklist, setChecklist] = useState([]);
  const [novoItem, setNovoItem] = useState("");

  useEffect(() => {
    localStorage.setItem("tarefas", JSON.stringify(board));
  }, [board]);

  /* ✅ EXPORTAÇÃO FUNCIONA */
  function exportarExcel() {
    const linhas = [
      ["Status","Título","Descrição","Prazo","Prioridade","Checklist","Progresso (%)"]
    ];

    ETAPAS.forEach(coluna => {
      board[coluna].forEach(t => {
        const checklistTexto = t.checklist
          .map(i => `${i.done ? "OK" : "PENDENTE"} - ${i.text}`)
          .join(" | ");

        linhas.push([
          coluna,
          t.titulo,
          t.descricao || "",
          t.prazo || "",
          t.prioridade,
          checklistTexto,
          progressoChecklist(t.checklist)
        ]);
      });
    });

    const csv = linhas
      .map(l => l.map(v => `"${String(v).replace(/"/g, '""')}"`).join(";"))
      .join("\n");

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "tarefas.xlsx.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function abrirCriar() {
    setEditando(null);
    setTitulo("");
    setDescricao("");
    setPrazo("");
    setPrioridade("Média");
    setChecklist([]);
    setModal(true);
  }

  function abrirEditar(coluna, tarefa) {
    setEditando({ coluna, id: tarefa.id });
    setTitulo(tarefa.titulo);
    setDescricao(tarefa.descricao || "");
    setPrazo(tarefa.prazo || "");
    setPrioridade(tarefa.prioridade);
    setChecklist(tarefa.checklist || []);
    setModal(true);
  }

  function salvar() {
    if (!titulo.trim()) return;

    const tarefa = {
      id: editando?.id || Date.now(),
      titulo,
      descricao,
      prazo,
      prioridade,
      checklist
    };

    setBoard(prev => {
      const novo = { ...prev };
      if (editando) {
        novo[editando.coluna] = novo[editando.coluna].map(t =>
          t.id === tarefa.id ? tarefa : t
        );
      } else {
        novo["A Fazer"] = [...novo["A Fazer"], tarefa];
      }
      return novo;
    });

    setModal(false);
  }

  return React.createElement(
    "div",
    { className:"p-6 max-w-7xl mx-auto" },

    React.createElement("header",{className:"flex justify-between items-center mb-6"},
      React.createElement("h1",{className:"text-3xl font-bold"},"TAREFAS"),
      React.createElement("div",{className:"flex gap-3"},
        React.createElement("button",{className:"bg-blue-600 px-4 py-2 rounded",onClick:abrirCriar},"+ Criar tarefa"),
        React.createElement("button",{className:"bg-green-600 px-4 py-2 rounded",onClick:exportarExcel},"⬇ Exportar Excel")
      )
    ),

    React.createElement("div",{className:"grid md:grid-cols-3 gap-6"},
      ETAPAS.map(coluna =>
        React.createElement("div",{key:coluna,className:"bg-gray-900 p-4 rounded"},
          React.createElement("h2",{className:"font-semibold mb-3"},coluna),
          board[coluna].map(t =>
            React.createElement("div",{key:t.id,className:`relative bg-gray-800 p-3 mb-3 rounded border-l-4 ${corPorColuna[coluna]}`},
              React.createElement("strong",null,t.titulo),
              React.createElement("div",{className:"absolute bottom-2 right-2"},
                React.createElement("span",{className:"px-2 py-1 text-xs rounded-full font-semibold "+corPrioridadeBadge[t.prioridade]},t.prioridade)
              )
            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
</script>
</body>
</html>
