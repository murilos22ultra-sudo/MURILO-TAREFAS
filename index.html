<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAREFAS</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body class="bg-gray-950 text-gray-100">
<div id="root"></div>

<script>
const { useState, useEffect } = React;

const etapas = ["A Fazer", "Em Progresso", "Concluído"];

/* Cores por coluna (status) */
const corPorColuna = {
  "A Fazer": "border-l-red-500",
  "Em Progresso": "border-l-yellow-500",
  "Concluído": "border-l-green-500"
};

/* Badge de prioridade */
const corPrioridadeBadge = {
  Alta: "bg-red-600 text-white",
  Média: "bg-yellow-500 text-black",
  Baixa: "bg-green-600 text-white"
};

const progressoChecklist = (list = []) =>
  list.length
    ? Math.round((list.filter(i => i.done).length / list.length) * 100)
    : 0;

function App() {
  const [board, setBoard] = useState(
    JSON.parse(localStorage.getItem("tarefas")) || {
      "A Fazer": [],
      "Em Progresso": [],
      "Concluído": []
    }
  );

  const [modal, setModal] = useState(false);
  const [editando, setEditando] = useState(null);

  const [titulo, setTitulo] = useState("");
  const [descricao, setDescricao] = useState("");
  const [prazo, setPrazo] = useState("");
  const [prioridade, setPrioridade] = useState("Média");
  const [checklist, setChecklist] = useState([]);
  const [novoItem, setNovoItem] = useState("");

  useEffect(() => {
    localStorage.setItem("tarefas", JSON.stringify(board));
  }, [board]);

  /* EXPORTAÇÃO PARA EXCEL (CSV) */
  function exportarExcel() {
    let linhas = [
      ["Status","Título","Descrição","Prazo","Prioridade","Checklist","Progresso (%)"]
    ];

    etapas.forEach(coluna => {
      board[coluna].forEach(t => {
        const checklistTexto = t.checklist
          .map(i => `${i.done ? "✅" : "⬜"} ${i.text}`)
          .join(" | ");

        linhas.push([
          coluna,
          t.titulo,
          t.descricao || "",
          t.prazo || "",
          t.prioridade,
          checklistTexto,
          progressoChecklist(t.checklist)
        ]);
      });
    });

    const csv = linhas.map(l => l.map(v => `"${v.replace(/"/g,'""')}"`).join(";")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "tarefas.xlsx.csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  function abrirCriar() {
    setEditando(null);
    setTitulo("");
    setDescricao("");
    setPrazo("");
    setPrioridade("Média");
    setChecklist([]);
    setModal(true);
  }

  function abrirEditar(coluna, tarefa) {
    setEditando({ coluna, id: tarefa.id });
    setTitulo(tarefa.titulo);
    setDescricao(tarefa.descricao || "");
    setPrazo(tarefa.prazo || "");
    setPrioridade(tarefa.prioridade);
    setChecklist(tarefa.checklist || []);
    setModal(true);
  }

  function salvar() {
    if (!titulo) return;

    const tarefa = {
      id: editando?.id || Date.now(),
      titulo,
      descricao,
      prazo,
      prioridade,
      checklist
    };

    setBoard(prev => {
      const novo = { ...prev };
      if (editando) {
        novo[editando.coluna] = novo[editando.coluna].map(t =>
          t.id === tarefa.id ? tarefa : t
        );
      } else {
        novo["A Fazer"] = [...novo["A Fazer"], tarefa];
      }
      return novo;
    });

    setModal(false);
  }

  function excluir(coluna, id) {
    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].filter(t => t.id !== id)
    }));
  }

  function dragStart(e, coluna, tarefa) {
    e.dataTransfer.setData("task", JSON.stringify({ coluna, tarefa }));
  }

  function drop(e, destino) {
    const data = JSON.parse(e.dataTransfer.getData("task"));
    setBoard(prev => ({
      ...prev,
      [data.coluna]: prev[data.coluna].filter(t => t.id !== data.tarefa.id),
      [destino]: [...prev[destino], data.tarefa]
    }));
  }

  function adicionarChecklist() {
    if (!novoItem) return;
    setChecklist([...checklist, { text: novoItem, done: false }]);
    setNovoItem("");
  }

  return React.createElement("div",{className:"p-6 max-w-7xl mx-auto"},

    React.createElement("header",{className:"flex justify-between mb-6"},
      React.createElement("h1",{className:"text-3xl font-bold"},"TAREFAS"),
      React.createElement("div",{className:"flex gap-3"},
        React.createElement("button",{className:"bg-blue-600 px-4 py-2 rounded",onClick:abrirCriar},"+ Criar tarefa"),
        React.createElement("button",{className:"bg-green-600 px-4 py-2 rounded",onClick:exportarExcel},"⬇ Exportar Excel")
      )
    ),

    React.createElement("div",{className:"grid md:grid-cols-3 gap-6"},
      etapas.map(coluna =>
        React.createElement("div",{
          key:coluna,
          className:"bg-gray-900 p-4 rounded-xl",
          onDragOver:e=>e.preventDefault(),
          onDrop:e=>drop(e,coluna)
        },
          React.createElement("h2",{className:"font-semibold mb-3"},coluna),

          board[coluna].map(t =>
            React.createElement("div",{
              key:t.id,
              draggable:true,
              onDragStart:e=>dragStart(e,coluna,t),
              className:`relative bg-gray-800 p-3 mb-3 rounded border-l-4 ${corPorColuna[coluna]}`
            },

              React.createElement("strong",null,t.titulo),
              t.prazo && React.createElement("div",{className:"text-xs text-gray-400"},"Prazo: "+t.prazo),

              React.createElement("div",{className:"absolute bottom-2 right-2"},
                React.createElement("span",{className:"px-2 py-1 text-xs rounded-full font-semibold "+corPrioridadeBadge[t.prioridade]},t.prioridade)
              ),

              React.createElement("div",{className:"flex gap-2 text-xs mt-2"},
                React.createElement("button",{className:"text-blue-400",onClick:()=>abrirEditar(coluna,t)},"Editar"),
                React.createElement("button",{className:"text-red-400",onClick:()=>excluir(coluna,t.id)},"Excluir")
              )
            )
          )
        )
      )
    ),

    modal &&
      React.createElement("div",{className:"fixed inset-0 bg-black/70 flex items-center justify-center"},
        React.createElement("div",{className:"bg-gray-900 p-6 rounded w-full max-w-xl"},
          React.createElement("input",{className:"w-full mb-2 p-2 bg-gray-800",placeholder:"Título",value:titulo,onChange:e=>setTitulo(e.target.value)}),
          React.createElement("textarea",{className:"w-full mb-2 p-2 bg-gray-800",placeholder:"Descrição",value:descricao,onChange:e=>setDescricao(e.target.value)}),
          React.createElement("input",{type:"date",className:"w-full mb-2 p-2 bg-gray-800",value:prazo,onChange:e=>setPrazo(e.target.value)}),
          React.createElement("select",{className:"w-full mb-2 p-2 bg-gray-800",value:prioridade,onChange:e=>setPrioridade(e.target.value)},
            ["Baixa","Média","Alta"].map(p=>React.createElement("option",{key:p},p))
          ),
          React.createElement("button",{className:"bg-blue-600 px-4 py-2 rounded",onClick:salvar},"Salvar")
        )
      )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
