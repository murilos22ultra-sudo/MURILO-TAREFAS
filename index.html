<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAREFAS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body class="bg-gray-950 text-gray-100">
<div id="root"></div>

<script>
const { useState, useEffect } = React;

/* Colunas fixas (status NÃO depende de data) */
const ETAPAS = ["A Fazer", "Em Progresso", "Concluído"];

/* Cores por status */
const corPorColuna = {
  "A Fazer": "border-l-red-500",
  "Em Progresso": "border-l-yellow-500",
  "Concluído": "border-l-green-500"
};

/* Badge prioridade */
const corPrioridadeBadge = {
  Alta: "bg-red-600 text-white",
  Média: "bg-yellow-500 text-black",
  Baixa: "bg-green-600 text-white"
};

/* Progresso do checklist */
function progressoChecklist(lista = []) {
  if (!lista.length) return 0;
  return Math.round(
    (lista.filter(i => i.done).length / lista.length) * 100
  );
}

function App() {

  /* ✅ Inicialização SEGURA: tarefas NÃO somem */
  const [board, setBoard] = useState(() => {
    const salvo = localStorage.getItem("tarefas");
    if (!salvo) {
      return {
        "A Fazer": [],
        "Em Progresso": [],
        "Concluído": []
      };
    }
    try {
      return JSON.parse(salvo);
    } catch {
      return {
        "A Fazer": [],
        "Em Progresso": [],
        "Concluído": []
      };
    }
  });

  const [modal, setModal] = useState(false);
  const [editando, setEditando] = useState(null);

  const [titulo, setTitulo] = useState("");
  const [descricao, setDescricao] = useState("");
  const [prazo, setPrazo] = useState("");
  const [prioridade, setPrioridade] = useState("Média");
  const [checklist, setChecklist] = useState([]);
  const [novoItem, setNovoItem] = useState("");

  /* ✅ Salvamento automático — SEM lógica de data */
  useEffect(() => {
    localStorage.setItem("tarefas", JSON.stringify(board));
  }, [board]);

  /* Criar / Editar */
  function abrirCriar() {
    setEditando(null);
    setTitulo("");
    setDescricao("");
    setPrazo("");
    setPrioridade("Média");
    setChecklist([]);
    setModal(true);
  }

  function abrirEditar(coluna, tarefa) {
    setEditando({ coluna, id: tarefa.id });
    setTitulo(tarefa.titulo);
    setDescricao(tarefa.descricao || "");
    setPrazo(tarefa.prazo || "");
    setPrioridade(tarefa.prioridade);
    setChecklist(tarefa.checklist || []);
    setModal(true);
  }

  function salvar() {
    if (!titulo.trim()) return;

    const tarefa = {
      id: editando?.id || Date.now(),
      titulo,
      descricao,
      prazo,        // prazo é APENAS informativo
      prioridade,
      checklist
    };

    setBoard(prev => {
      const novo = { ...prev };
      if (editando) {
        novo[editando.coluna] =
          novo[editando.coluna].map(t =>
            t.id === tarefa.id ? tarefa : t
          );
      } else {
        novo["A Fazer"] = [...novo["A Fazer"], tarefa];
      }
      return novo;
    });

    setModal(false);
  }

  function excluir(coluna, id) {
    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].filter(t => t.id !== id)
    }));
  }

  /* Checklist */
  function toggleChecklist(coluna, tarefaId, index) {
    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].map(t => {
        if (t.id !== tarefaId) return t;
        const novo = [...t.checklist];
        novo[index].done = !novo[index].done;
        return { ...t, checklist: novo };
      })
    }));
  }

  function editarItemChecklist(coluna, tarefaId, index) {
    const texto = prompt("Editar item do checklist:");
    if (!texto) return;

    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].map(t => {
        if (t.id !== tarefaId) return t;
        const novo = [...t.checklist];
        novo[index].text = texto;
        return { ...t, checklist: novo };
      })
    }));
  }

  function excluirItemChecklist(coluna, tarefaId, index) {
    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].map(t => {
        if (t.id !== tarefaId) return t;
        return { ...t, checklist: t.checklist.filter((_, i) => i !== index) };
      })
    }));
  }

  /* Drag & Drop (ÚNICA forma de mudar status) */
  function dragStart(e, coluna, tarefa) {
    e.dataTransfer.setData(
      "task",
      JSON.stringify({ coluna, tarefa })
    );
  }

  function drop(e, destino) {
    const data = JSON.parse(e.dataTransfer.getData("task"));
    setBoard(prev => ({
      ...prev,
      [data.coluna]: prev[data.coluna].filter(t => t.id !== data.tarefa.id),
      [destino]: [...prev[destino], data.tarefa]
    }));
  }

  function adicionarChecklist() {
    if (!novoItem.trim()) return;
    setChecklist([...checklist, { text: novoItem, done: false }]);
    setNovoItem("");
  }

  return React.createElement("div", { className: "p-6 max-w-7xl mx-auto" },

    /* HEADER */
    React.createElement("header", { className: "flex justify-between mb-6" },
      React.createElement("h1", { className: "text-3xl font-bold" }, "TAREFAS"),
      React.createElement("button", {
        className:"bg-blue-600 px-4 py-2 rounded",
        onClick: abrirCriar
      }, "+ Criar tarefa")
    ),

    /* COLUNAS */
    React.createElement("div", { className:"grid md:grid-cols-3 gap-6" },
      ETAPAS.map(coluna =>
        React.createElement("div", {
          key: coluna,
          className:"bg-gray-900 p-4 rounded-xl",
          onDragOver:e=>e.preventDefault(),
          onDrop:e=>drop(e,coluna)
        },
          React.createElement("h2",{className:"font-semibold mb-3"},coluna),

          board[coluna].map(t =>
            React.createElement("div", {
              key: t.id,
              draggable:true,
              onDragStart:e=>dragStart(e,coluna,t),
              className:`relative bg-gray-800 p-3 mb-3 rounded border-l-4 ${corPorColuna[coluna]}`
            },

              React.createElement("strong",null,t.titulo),

              t.prazo &&
                React.createElement("div",{className:"text-xs text-gray-400"},"Prazo: "+t.prazo),

              /* DESCRIÇÃO */
              t.descricao &&
                React.createElement("div",{className:"mt-2 text-sm text-gray-300"},
                  React.createElement("div",{className:"line-clamp-2"},t.descricao),
                  React.createElement("details",{className:"mt-1"},
                    React.createElement("summary",{className:"cursor-pointer text-xs text-blue-400"},"Ver detalhes"),
                    React.createElement("div",{className:"mt-2 whitespace-pre-wrap text-gray-200"},t.descricao)
                  )
                ),

              /* CHECKLIST */
              t.checklist.map((item,i)=>
                React.createElement("div",{key:i,className:"flex justify-between items-center text-sm mt-1"},
                  React.createElement("div",{className:"flex gap-2 items-center"},
                    React.createElement("input",{type:"checkbox",checked:item.done,onChange:()=>toggleChecklist(coluna,t.id,i)}),
                    React.createElement("span",{className:item.done?"line-through opacity-60":""},item.text)
                  ),
                  React.createElement("div",{className:"flex gap-2 text-xs"},
                    React.createElement("button",{className:"text-blue-400",onClick:()=>editarItemChecklist(coluna,t.id,i)},"Editar"),
                    React.createElement("button",{className:"text-red-400",onClick:()=>excluirItemChecklist(coluna,t.id,i)},"Excluir")
                  )
                )
              ),

              /* BADGE PRIORIDADE */
              React.createElement("div",{className:"absolute bottom-2 right-2"},
                React.createElement("span",{className:"px-2 py-1 text-xs rounded-full font-semibold "+corPrioridadeBadge[t.prioridade]},t.prioridade)
              ),

              React.createElement("div",{className:"flex gap-3 text-xs mt-3"},
                React.createElement("button",{className:"text-blue-400",onClick:()=>abrirEditar(coluna,t)},"Editar"),
                React.createElement("button",{className:"text-red-400",onClick:()=>excluir(coluna,t.id)},"Excluir")
              )
            )
          )
        )
      )
    ),

    /* MODAL */
    modal &&
      React.createElement("div",{className:"fixed inset-0 bg-black/70 flex items-center justify-center"},
        React.createElement("div",{className:"bg-gray-900 p-6 rounded w-full max-w-xl"},
          React.createElement("input",{className:"w-full mb-2 p-2 bg-gray-800",placeholder:"Título",value:titulo,onChange:e=>setTitulo(e.target.value)}),
          React.createElement("textarea",{className:"w-full mb-2 p-2 bg-gray-800",placeholder:"Descrição",value:descricao,onChange:e=>setDescricao(e.target.value)}),
          React.createElement("input",{type:"date",className:"w-full mb-2 p-2 bg-gray-800",value:prazo,onChange:e=>setPrazo(e.target.value)}),
          React.createElement("select",{className:"w-full mb-2 p-2 bg-gray-800",value:prioridade,onChange:e=>setPrioridade(e.target.value)},
            ["Baixa","Média","Alta"].map(p=>React.createElement("option",{key:p},p))
          ),
          React.createElement("div",{className:"flex gap-2"},
            React.createElement("input",{className:"flex-1 p-2 bg-gray-800",placeholder:"Item do checklist",value:novoItem,onChange:e=>setNovoItem(e.target.value)}),
            React.createElement("button",{className:"bg-gray-700 px-3 rounded",onClick:adicionarChecklist},"Adicionar")
          ),
          React.createElement("div",{className:"flex justify-end gap-2 mt-4"},
            React.createElement("button",{className:"bg-gray-700 px-4 py-2 rounded",onClick:()=>setModal(false)},"Cancelar"),
            React.createElement("button",{className:"bg-blue-600 px-4 py-2 rounded",onClick:salvar},"Salvar")
          )
        )
      )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
</script>
</body>
</html>
