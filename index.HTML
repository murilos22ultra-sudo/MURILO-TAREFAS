<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TAREFAS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body class="bg-gray-950 text-gray-100">
<div id="root"></div>

<script>
const { useState, useEffect } = React;

const etapas = ["A Fazer", "Em Progresso", "Concluído"];
const prioridadeCor = {
  Baixa: "border-l-green-500",
  Média: "border-l-yellow-500",
  Alta: "border-l-red-500"
};

const progresso = (lista = []) =>
  lista.length ? Math.round((lista.filter(i => i.done).length / lista.length) * 100) : 0;

function App() {
  const [board, setBoard] = useState(
    JSON.parse(localStorage.getItem("tarefas")) || {
      "A Fazer": [],
      "Em Progresso": [],
      "Concluído": []
    }
  );

  const [mostrarModal, setMostrarModal] = useState(false);
  const [editando, setEditando] = useState(null);

  const [titulo, setTitulo] = useState("");
  const [descricao, setDescricao] = useState("");
  const [prazo, setPrazo] = useState("");
  const [prioridade, setPrioridade] = useState("Média");
  const [checklist, setChecklist] = useState([]);
  const [novoItem, setNovoItem] = useState("");

  useEffect(() => {
    localStorage.setItem("tarefas", JSON.stringify(board));
  }, [board]);

  function abrirCriar() {
    setEditando(null);
    setTitulo("");
    setDescricao("");
    setPrazo("");
    setPrioridade("Média");
    setChecklist([]);
    setMostrarModal(true);
  }

  function abrirEditar(coluna, tarefa) {
    setEditando({ coluna, id: tarefa.id });
    setTitulo(tarefa.titulo);
    setDescricao(tarefa.descricao || "");
    setPrazo(tarefa.prazo || "");
    setPrioridade(tarefa.prioridade);
    setChecklist(tarefa.checklist || []);
    setMostrarModal(true);
  }

  function salvar() {
    if (!titulo) return;

    const tarefa = {
      id: editando?.id || Date.now(),
      titulo,
      descricao,
      prazo,
      prioridade,
      checklist
    };

    setBoard(prev => {
      const novo = { ...prev };
      if (editando) {
        novo[editando.coluna] = novo[editando.coluna].map(t =>
          t.id === tarefa.id ? tarefa : t
        );
      } else {
        novo["A Fazer"] = [...novo["A Fazer"], tarefa];
      }
      return novo;
    });

    setMostrarModal(false);
  }

  function excluir(coluna, id) {
    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].filter(t => t.id !== id)
    }));
  }

  function toggleChecklist(coluna, tarefaId, index) {
    setBoard(prev => ({
      ...prev,
      [coluna]: prev[coluna].map(t => {
        if (t.id !== tarefaId) return t;
        const novo = [...t.checklist];
        novo[index].done = !novo[index].done;
        return { ...t, checklist: novo };
      })
    }));
  }

  function dragStart(e, coluna, tarefa) {
    e.dataTransfer.setData("task", JSON.stringify({ coluna, tarefa }));
  }

  function drop(e, destino) {
    const data = JSON.parse(e.dataTransfer.getData("task"));
    setBoard(prev => ({
      ...prev,
      [data.coluna]: prev[data.coluna].filter(t => t.id !== data.tarefa.id),
      [destino]: [...prev[destino], data.tarefa]
    }));
  }

  function adicionarChecklist() {
    if (novoItem) {
      setChecklist([...checklist, { text: novoItem, done: false }]);
      setNovoItem("");
    }
  }

  return (
    React.createElement("div", { className: "p-6 max-w-7xl mx-auto" },

      React.createElement("header", { className: "flex justify-between mb-6" },
        React.createElement("h1", { className: "text-3xl font-bold" }, "TAREFAS"),
        React.createElement("button", { className: "bg-blue-600 px-4 py-2 rounded", onClick: abrirCriar }, "+ Criar tarefa")
      ),

      React.createElement("div", { className: "grid md:grid-cols-3 gap-6" },
        etapas.map(coluna =>
          React.createElement("div", {
            key: coluna,
            className: "bg-gray-900 p-4 rounded-xl",
            onDragOver: e => e.preventDefault(),
            onDrop: e => drop(e, coluna)
          },
            React.createElement("h2", { className: "font-semibold mb-3" }, coluna),

            board[coluna].map(t => {
              const pct = progresso(t.checklist);
              return React.createElement("div", {
                key: t.id,
                draggable: true,
                onDragStart: e => dragStart(e, coluna, t),
                className: `bg-gray-800 p-3 mb-3 rounded border-l-4 ${prioridadeCor[t.prioridade]}`
              },
                React.createElement("div", { className: "flex justify-between" },
                  React.createElement("span", { className: "font-medium" }, t.titulo),
                  t.checklist.length > 0 && React.createElement("span", { className: "text-xs bg-gray-700 px-2 rounded" }, pct + "%")
                ),

                t.prazo && React.createElement("div", { className: "text-xs text-gray-400" }, "Prazo: " + t.prazo),

                t.descricao &&
                  React.createElement("details", {},
                    React.createElement("summary", { className: "cursor-pointer text-sm" }, "Detalhes"),
                    React.createElement("div", { className: "text-sm mt-2 whitespace-pre-wrap" }, t.descricao)
                  ),

                t.checklist.map((item, i) =>
                  React.createElement("label", { key: i, className: "flex gap-2 text-sm" },
                    React.createElement("input", { type: "checkbox", checked: item.done, onChange: () => toggleChecklist(coluna, t.id, i) }),
                    React.createElement("span", { className: item.done ? "line-through opacity-60" : "" }, item.text)
                  )
                ),

                React.createElement("div", { className: "flex gap-3 text-xs mt-2" },
                  React.createElement("button", { className: "text-blue-400", onClick: () => abrirEditar(coluna, t) }, "Editar"),
                  React.createElement("button", { className: "text-red-400", onClick: () => excluir(coluna, t.id) }, "Excluir")
                )
              );
            })
          )
        )
      ),

      mostrarModal &&
      React.createElement("div", { className: "fixed inset-0 bg-black/70 flex justify-center items-center" },
        React.createElement("div", { className: "bg-gray-900 p-6 rounded w-full max-w-xl" },
          React.createElement("h3", { className: "text-xl font-semibold mb-3" }, editando ? "Editar tarefa" : "Criar tarefa"),

          React.createElement("input", { className: "w-full mb-2 p-2 bg-gray-800 rounded", placeholder: "Título", value: titulo, onChange: e => setTitulo(e.target.value) }),
          React.createElement("textarea", { className: "w-full mb-2 p-2 bg-gray-800 rounded", placeholder: "Descrição", value: descricao, onChange: e => setDescricao(e.target.value) }),
          React.createElement("input", { type: "date", className: "w-full mb-2 p-2 bg-gray-800 rounded", value: prazo, onChange: e => setPrazo(e.target.value) }),

          React.createElement("select", { className: "w-full mb-2 p-2 bg-gray-800 rounded", value: prioridade, onChange: e => setPrioridade(e.target.value) },
            ["Baixa", "Média", "Alta"].map(p => React.createElement("option", { key: p }, p))
          ),

          React.createElement("div", { className: "flex gap-2 mb-2" },
            React.createElement("input", { className: "flex-1 p-2 bg-gray-800 rounded", placeholder: "Item do checklist", value: novoItem, onChange: e => setNovoItem(e.target.value) }),
            React.createElement("button", { className: "bg-gray-700 px-3 rounded", onClick: adicionarChecklist }, "Adicionar")
          ),

          React.createElement("div", { className: "flex justify-end gap-2 mt-4" },
            React.createElement("button", { className: "bg-gray-700 px-4 py-2 rounded", onClick: () => setMostrarModal(false) }, "Cancelar"),
            React.createElement("button", { className: "bg-blue-600 px-4 py-2 rounded", onClick: salvar }, "Salvar")
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
``
